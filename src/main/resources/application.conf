ktor {
    development = ${?KTOR_DEVELOPMENT}
    environment = ${?KTOR_ENV}
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.devapplab.ApplicationKt.module ]
    }
}

database {
    url = ${?URL_DB}
    driver = ${?DRIVER_DB}
    user = ${?USER_DB}
    password = ${?PASSWORD_DB}
 }

jwt {
    private = ${?PRIVATE}
    public = ${?PUBLIC}
    issuer = ${?ISSUER}
    audience = ${?AUDIENCE}
    realm = ${?REALM}
    algorithm = ${?ALGORITHM}
    access_token_minutes = ${?ACCESS_TOKEN_TIME}
    refresh_token_days = ${?REFRESH_TOKEN_TIME}
    refresh_token_rotation_time = ${?REFRESH_TOKEN_ROTATION_TIME}
}

mfa {
  rateLimit {
    minWaitSeconds = ${MFA_MIN_WAIT_SECONDS}
  }
  lockout {
    maxAttempts = ${MFA_MAX_ATTEMPTS}
    timeWindowHours = ${MFA_TIME_WINDOW_HOURS}
    lockDurationMinutes = ${MFA_LOCK_DURATION_MINUTES}
  }
}

firebase {
    config_json = ${CONFIG_JSON}
}

appCheck {
    enabled = ${?APP_CHECK_ENABLED}
    enforce = ${?APP_CHECK_ENFORCE}
    projectNumber = ${?FIREBASE_PROJECT_NUMBER}
    allowedAppIds = ${?FIREBASE_APP_CHECK_ALLOWED_APP_IDS}
}

match {
    payment {
        maxJoinWindowHours = ${?MATCH_JOIN_PAYMENT_WINDOW_HOURS}
    }
}

email {
    apiToken = ${EMAIL_TOKEN}
    domainPolicy {
        enforceAllowlist = ${?EMAIL_DOMAIN_ENFORCE_ALLOWLIST}
        allowedDomains = ${?EMAIL_ALLOWED_DOMAINS}
        blockedDomains = ${?EMAIL_BLOCKED_DOMAINS}
    }
}

cloudinary {
    cloud_name = ${CLOUDINARY_KEY_NAME}
    api_key = ${CLOUDINARY_API_KEY}
    api_secret = ${CLOUDINARY_API_SECRET}
}

payment {
    stripe {
       apiKey = ${STRIPE_API_KEY}
       webhookSecret = ${STRIPE_WH_SEC}
       publishableKey = ${STRIPE_PUBLISHABLE_KEY}
    }
}
